---
layout: default
title: Guitar Chordinator
permalink: /tools/guitar-chordinator/
---

<main class="content tool-page scalar-triads guitar-chordinator" role="main">
  <header class="tool-header">
    <p class="tool-eyebrow"><a href="/tools/">Tools</a></p>
    <h1>Guitar Chordinator</h1>
  </header>

  <section class="scale-tool chordinator-tool" aria-labelledby="chordinator-heading">
    <div class="result-heading">
      <h2 id="chordinator-heading">Chord shape</h2>
      <p id="chordinator-tuning-description">Standard tuning, frets 0-15</p>
    </div>

    <div class="chordinator-actions" aria-label="Chord controls">
      <button type="button" id="chordinator-sample">Reset to C</button>
      <button type="button" id="chordinator-clear">Clear</button>
      <div class="chordinator-preset-control">
        <label for="chordinator-preset">Preset</label>
        <select id="chordinator-preset" class="chordinator-preset">
          <option value="standard">Standard</option>
          <option value="drop-d">Drop D</option>
          <option value="open-g">Open G</option>
          <option value="open-d">Open D</option>
          <option value="dadgad">DADGAD</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="chordinator-recent-settings-control">
        <label for="chordinator-recent-settings">Recent settings</label>
        <select id="chordinator-recent-settings" disabled>
          <option>No saved settings</option>
        </select>
        <button type="button" id="chordinator-clear-history" disabled>Clear saved history</button>
      </div>
    </div>

    <div class="fretboard-scroll">
      <div class="fretboard chordinator-fretboard" id="chordinator-fretboard"></div>
    </div>
  </section>

  <section class="scale-results chordinator-results" id="chordinator-results" aria-live="polite">
    <section class="result-section" aria-labelledby="matches-heading">
      <div class="result-heading">
        <h2 id="matches-heading">Chord names</h2>
      </div>
      <div class="chord-matches" id="chord-matches"></div>
    </section>

    <section class="result-section chordinator-selected-summary" aria-labelledby="selected-notes-heading">
      <div class="result-heading">
        <h2 id="selected-notes-heading">Selected notes</h2>
        <p id="chordinator-shape">x32010</p>
      </div>
      <ol class="note-pills" id="selected-notes" aria-label="Selected notes"></ol>
    </section>
  </section>
</main>

<script src="/assets/js/guitar-chordinator.js"></script>
