name: Jekyll

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: ShellCheck preview launcher
        run: shellcheck scripts/serve

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.4'
          bundler-cache: true

      - name: Build production site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --source site --destination _site --trace --strict_front_matter

      - name: Test Goodreads synchronization
        run: ruby test/sync_goodreads_test.rb

      - name: Test reading page rendering
        run: ruby test/site_render_test.rb

      - name: Verify preserved URLs
        run: ruby .github/scripts/check_preserved_urls.rb

      - name: Check internal links
        run: ruby .github/scripts/check_internal_links.rb

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Build preview site
        env:
          JEKYLL_ENV: preview
        run: bundle exec jekyll build --source site --destination _site_preview --trace --strict_front_matter

      - name: Verify preview noindex
        run: ruby .github/scripts/check_preview_noindex.rb _site_preview

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
