name: Jekyll

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build production site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace --strict_front_matter

      - name: Verify preserved URLs
        run: ruby scripts/check_preserved_urls.rb

      - name: Check internal links
        run: ruby scripts/check_internal_links.rb

      - name: Build preview site
        env:
          JEKYLL_ENV: preview
        run: bundle exec jekyll build --trace --strict_front_matter --destination _site_preview

      - name: Verify preview noindex
        run: ruby scripts/check_preview_noindex.rb _site_preview
